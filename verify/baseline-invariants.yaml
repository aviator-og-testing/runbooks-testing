# Baseline invariants for this app's verify runs.
#
# These are standing guardrails Aviator verify checks on every relevant PR (not
# descriptions of current features). `just verify-invariants` wipes the existing
# `[AUTOGEN]`-titled invariants for this repo's account and recreates them from
# this file, so editing here + re-running is the whole workflow. Each is seeded
# with a "[AUTOGEN] " title prefix so you can also find/delete them in psql.
#
# The pre-pass decides whether each is checked through the live preview (runtime)
# or from the diff (code scan); the phrasing + conditions nudge the routing. The
# first group leans on the preview, the second on the code.
#
# Fields:
#   key        stable human handle (not used by the seeder; for your reference)
#   category   one of the seeded invariant category slugs
#   title      shown in settings + verify output (seeded as "[AUTOGEN] <title>")
#   body       the full rule text the model sees at verify time
#   conditions optional file-glob gates; empty means it applies to every PR

# --- Preview-checkable (runtime) ---

- key: auth-gate-enforced
  category: security
  title: Auth gate enforced
  body: >-
    A signed-out visitor must be redirected to the login screen and never see the
    dashboard, users, or posts.
  conditions:
    - { type: file_path_glob, value: "frontend/**" }

- key: admin-controls-hidden
  category: security
  title: Admin controls hidden from regular users
  body: >-
    A regular (non-admin) user must not be shown admin-only controls such as
    creating or deleting users.
  conditions:
    - { type: file_path_glob, value: "frontend/**" }

- key: user-content-inert
  category: security
  title: User content renders inert
  body: >-
    User-supplied text must render as inert text in the browser, never as active
    markup (no XSS).
  conditions:
    - { type: file_path_glob, value: "frontend/**" }

- key: destructive-confirm
  category: functional_correctness
  title: Destructive actions confirm
  body: >-
    Deleting a user must require an explicit confirmation step; a single click
    must not delete the account.
  conditions:
    - { type: file_path_glob, value: "frontend/**" }

- key: controls-accessible
  category: accessibility
  title: Controls have accessible labels
  body: >-
    Interactive controls (buttons, inputs, links) must expose accessible labels.
  conditions:
    - { type: file_path_glob, value: "frontend/**" }

# --- Code-checkable (code scan) ---

- key: no-secret-in-api
  category: security
  title: No secrets in API responses
  body: API responses must never include stored secrets such as password fields.
  conditions:
    - { type: file_path_glob, value: "backend_python/**" }

- key: api-backwards-compatible
  category: backwards_compatibility
  title: API responses stay backwards-compatible
  body: >-
    Existing fields in API responses must not be removed or renamed; only
    additive changes are allowed.
  conditions:
    - { type: file_path_glob, value: "backend_python/**" }

- key: endpoints-have-tests
  category: test_coverage
  title: New endpoints have tests
  body: New or changed backend API endpoints must be covered by tests.
  conditions:
    - { type: file_path_glob, value: "backend_python/**" }
