name: Always Pass

on:
  workflow_dispatch:
    inputs:
      sleep_seconds:
        description: "Seconds to sleep before completing"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  pass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sleep
        if: inputs.sleep_seconds != '0' && inputs.sleep_seconds != ''
        run: |
          echo "💤 Sleeping for ${{ inputs.sleep_seconds }} seconds..."
          sleep ${{ inputs.sleep_seconds }}

      - name: Pass
        run: |
          echo "✅ This job always passes"
          exit 0
