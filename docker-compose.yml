services:
  backend_python:
    build:
      context: ./backend_python
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend_python/src:/app/src
    environment:
      - RUNBOOKS_TESTING_DB_PATH=/app/data/runbooks_testing.db
      - RUNBOOKS_TESTING_SEED_DEMO=1

  backend_go:
    build:
      context: ./backend_go
      target: prod
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend_python
    environment:
      - API_TARGET=http://backend_python:8000
